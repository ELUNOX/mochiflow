schema_version = 1

install_dir = ".mochiflow"
specs_dir = ".mochiflow/specs"
index = ".mochiflow/INDEX.md"

[i18n]
artifact_language = "en"
conversation_language = "ja"

[constitution]
project = ".mochiflow/constitution.md"
local = ".mochiflow/constitution.local.md"

[context]
product = ".mochiflow/context/product.md"
structure = ".mochiflow/context/structure.md"
tech = ".mochiflow/context/tech.md"

[adr]
decisions = ".mochiflow/adr/decisions.md"
pitfalls = ".mochiflow/adr/pitfalls.md"

[git]
provider = "github"
base_branch = "main"

[adapter]
tools = ["agents", "kiro"]

[surfaces.cli]
description = "MochiFlow CLI (Rust)"

[surfaces.cli.verify]
default = "cargo test --manifest-path cli/Cargo.toml && cargo fmt --manifest-path cli/Cargo.toml --all -- --check && cargo clippy --manifest-path cli/Cargo.toml --all-targets -- -D warnings && cargo run --manifest-path cli/Cargo.toml -- freeze --check"
quick = "cargo test --manifest-path cli/Cargo.toml && cargo run --manifest-path cli/Cargo.toml -- freeze --check"
