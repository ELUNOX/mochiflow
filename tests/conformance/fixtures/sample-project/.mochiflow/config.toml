schema_version = 1
engine_version = "2.0.0"
language = "en"

install_dir = ".mochiflow"
specs_dir = ".mochiflow/specs"
index = ".mochiflow/INDEX.md"

[constitution]
project = ".mochiflow/constitution.md"
local = ".mochiflow/constitution.local.md"

[context]
product = ".mochiflow/context/product.md"
structure = ".mochiflow/context/structure.md"
tech = ".mochiflow/context/tech.md"

[adr]
decisions = ".mochiflow/adr/decisions"
pitfalls = ".mochiflow/adr/pitfalls"

[git]
provider = "github"
base_branch = "main"
pr_command = "gh pr create --fill"

[adapter]
tool = "kiro"

[surfaces.app]
description = "primary surface"

[surfaces.app.verify]
default = "echo test-pass"
