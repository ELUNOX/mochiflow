name: macOS tests

on:
  push:
    branches: [main]
    paths:
      - cli/**
      - cli/Cargo.toml
      - cli/Cargo.lock
      - rust-toolchain.toml
      - rust-toolchain
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - run: cargo test --manifest-path cli/Cargo.toml
