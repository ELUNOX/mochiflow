name: Feature request
description: Suggest an idea or improvement for MochiFlow
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the problem you're trying to
        solve, not just the solution — it helps us find the best approach.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The pain point or use case. "I'm always frustrated when ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to happen. Commands, flags, or behavior if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (mochiflow binary)
        - Engine (commands / reference / templates)
        - Contracts / schemas
        - Adapters (kiro / claude-code / copilot / agents)
        - Docs
        - Not sure
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links, screenshots, related issues.
    validations:
      required: false
