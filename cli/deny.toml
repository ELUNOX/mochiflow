# cargo-deny configuration — supply-chain gate for the mochiflow CLI workspace.
# Run: cargo deny --manifest-path cli/Cargo.toml check --config cli/deny.toml

[advisories]
version = 2
# Fail on security advisories and yanked crates.
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses compatible with the project's MIT OR Apache-2.0 dual license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "Unicode-3.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
# Warn (do not fail) on duplicate dependency versions; fail on explicitly denied crates.
multiple-versions = "warn"
wildcards = "warn"
# Internal workspace path dependencies (e.g. mochiflow-cli -> mochiflow-core) are
# pathed without a version; do not flag them as wildcard dependencies.
allow-wildcard-paths = true
deny = []

[sources]
# Only allow crates from known registries / git sources.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
